name: Deploy Backend via Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**' # Chỉ chạy tiến trình này khi bạn sửa code backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Đăng nhập trực tiếp vào Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. Giao phó 100% việc build cho Dockerfile của bạn
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # LƯU Ý: Chữ "todo-backend" dưới đây là tên kho chứa (repository) bạn tạo trên Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

      # 3. Kết nối vào EC2 và ra lệnh tải image mới về chạy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/todo_app
            docker compose pull backend
            docker compose up -d backend
            docker image prune -f